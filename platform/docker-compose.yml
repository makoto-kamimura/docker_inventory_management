services:
  app:
    build: ./docker
    container_name: laravel_app
    ports:
      - "8000:8000"
    volumes:
      - ../app/backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    working_dir: /var/www
    environment:
      # migrate (default, データ保持) / fresh (初期化 + seed)
      MIGRATE_MODE: ${MIGRATE_MODE:-migrate}
      DB_HOST: ${DB_HOST:-demo-inventory-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-inventory_demo}
      DB_USERNAME: ${DB_USERNAME:-inv_user}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - default
      - prod_inventory
    command: sh -c "./wait-for-db.sh"

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventory}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -uroot
        - -p${MYSQL_ROOT_PASSWORD:-rootpassword}
      interval: 5s
      timeout: 3s
      retries: 20

  phpmyadmin:
    # Docker Library 公式タグ (multi-arch: amd64 / arm64/v8 / etc)
    # phpmyadmin/phpmyadmin は amd64 単独のため Apple Silicon でエミュ動作になる
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy

  alexa-server:
    image: node:22-alpine
    container_name: alexa_server
    volumes:
      - ./alexa-server:/app
    working_dir: /app
    command: sh -c "npm install && node index.js"
    environment:
      PORT: 3002
      API_BASE_URL: ${API_BASE_URL:-http://demo-inventory-api:8000}
      API_TOKEN: ${API_TOKEN}
    networks:
      default: {}
      prod_inventory: {}
      proxy_network:
        aliases:
          - demo-inventory-alexa
    restart: unless-stopped

  alexa-build:
    image: node:20-alpine
    profiles: ["alexa"]
    volumes:
      - ../app/alexa:/workspace
    working_dir: /workspace/lambda
    command: sh -c "apk add --no-cache zip && npm install && zip -r ../skill.zip index.js node_modules"

  web:
    build: ../app/web
    container_name: nextjs_web
    ports:
      - "3000:3000"
    volumes:
      # ソースを bind mount。dev モードのホットリロードと、production モードでも
      # 再ビルドなしにコード変更が次回 docker compose up で反映されるようにする。
      - ../app/web:/app
      # ホスト (macOS) の node_modules / .next が linux コンテナ側を上書きしないよう
      # 匿名ボリュームで隔離する。
      - /app/node_modules
      - /app/.next
    environment:
      # production (default, next build + next start) / dev (next dev で HMR)
      WEB_MODE: ${WEB_MODE:-production}
      # ブラウザから Laravel API を叩く URL。ホスト側から見える URL を指定する。
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - app

networks:
  prod_inventory:
    external: true
    name: docker_wordpress_demo_inventory_backend
  proxy_network:
    external: true
    name: docker_wordpress_proxy_network
